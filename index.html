<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>亚马逊 AI 商业情报舱 (V3.0 Hybrid)</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f3f4f6;
      color: #1f2937;
      line-height: 1.6;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    }

    h1 {
      font-size: 24px;
      border-bottom: 2px solid #e5e7eb;
      padding-bottom: 10px;
      margin-bottom: 20px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px;
      margin: 10px 0 20px 0;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      box-sizing: border-box;
      transition: all 0.3s;
    }

    /* 新增：被禁用的输入框样式 */
    input:disabled {
      background-color: #e5e7eb;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .mode-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .mode-online {
      background-color: #dbeafe;
      color: #1e40af;
    }

    .mode-offline {
      background-color: #dcfce3;
      color: #166534;
    }

    button {
      background-color: #2563eb;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      width: 100%;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #1d4ed8;
    }

    #loading {
      display: none;
      margin-top: 20px;
      text-align: center;
      color: #4b5563;
      font-weight: bold;
    }

    .result-section {
      margin-top: 30px;
      display: none;
    }

    .card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .card h3 {
      margin-top: 0;
      color: #111827;
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 8px;
    }

    .pain-points li {
      color: #dc2626;
      margin-bottom: 8px;
    }

    .selling-points li {
      color: #059669;
      margin-bottom: 8px;
    }

    .email-template {
      background: #1f2937;
      color: #e5e7eb;
      padding: 15px;
      border-radius: 6px;
      font-family: monospace;
      white-space: pre-wrap;
      margin-top: 10px;
    }

    .error {
      color: #dc2626;
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>亚马逊 AI 商业情报舱 (V3.0)</h1>

    <div>
      <span class="mode-badge mode-online">模式 A：在线实时抓取</span>
      <label>美国亚马逊商品链接：</label>
      <input type="text" id="urlInput" placeholder="输入链接，将自动禁用下方的问题框" oninput="toggleInputMode()">
    </div>

    <div>
      <span class="mode-badge mode-offline">模式 B：本地 RAG 精准检索</span>
      <label>你想具体分析产品哪方面？</label>
      <input type="text" id="userQuery" placeholder="输入问题（如：电池怎么样），将自动禁用上方链接框" oninput="toggleInputMode()">
    </div>

    <label>请输入专属邀请码：</label>
    <input type="password" id="inviteCode" placeholder="输入 AI2026">

    <button onclick="analyze()">启动双引擎分析</button>

    <div id="loading">AI 正在调度底层引擎，请耐心等待...</div>
    <div id="error" class="error"></div>

    <div id="result" class="result-section">
      <div class="card">
        <h3>第一维度：买家核心痛点 (选品与开模指导)</h3>
        <ul id="painPointsList" class="pain-points"></ul>
      </div>

      <div class="card">
        <h3>第二维度：核心卖点提炼 (Listing 优化建议)</h3>
        <ul id="sellingProposalsList" class="selling-points"></ul>
      </div>

      <div class="card">
        <h3>第三维度：公关危机介入 (专业客服话术模板)</h3>
        <div id="emailTemplate" class="email-template"></div>
      </div>
    </div>
  </div>

  <script>
    // 核心逻辑 1：输入框互斥与灰显控制
    function toggleInputMode() {
      const urlInput = document.getElementById('urlInput');
      const queryInput = document.getElementById('userQuery');

      if (urlInput.value.trim() !== '') {
        // 填了 URL，禁用并置灰问题框
        queryInput.disabled = true;
        queryInput.value = ''; // 清空可能残留的值
      } else if (queryInput.value.trim() !== '') {
        // 填了问题，禁用并置灰 URL 框
        urlInput.disabled = true;
        urlInput.value = '';
      } else {
        // 都没填，恢复双向可用
        urlInput.disabled = false;
        queryInput.disabled = false;
      }
    }

    async function analyze() {
      const url = document.getElementById('urlInput').value;
      const userQuery = document.getElementById('userQuery').value;
      const inviteCode = document.getElementById('inviteCode').value;
      const loading = document.getElementById('loading');
      const resultDiv = document.getElementById('result');
      const errorDiv = document.getElementById('error');

      // 核心逻辑 2：修复过严的拦截验证。只需保证填了邀请码，且 URL 或 问题 至少填了一个
      if (!inviteCode || (url.trim() === '' && userQuery.trim() === '')) {
        errorDiv.innerText = "错误：请提供邀请码，并选择填写商品链接或分析问题（二选一）。";
        return;
      }

      loading.style.display = 'block';
      resultDiv.style.display = 'none';
      errorDiv.innerText = '';

      try {
        const response = await fetch('https://wackier-doretha-muggily.ngrok-free.dev/api/analyze', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'ngrok-skip-browser-warning': 'true'
          },
          body: JSON.stringify({ url: url, user_query: userQuery, invite_code: inviteCode })
        });

        if (!response.ok) {
          throw new Error(`服务器拒绝请求 (状态码: ${response.status})`);
        }

        const data = await response.json();

        // 渲染列表
        const painUl = document.getElementById('painPointsList');
        painUl.innerHTML = '';
        data.pain_points.forEach(item => {
          let li = document.createElement('li');
          li.innerText = item;
          painUl.appendChild(li);
        });

        const sellingUl = document.getElementById('sellingProposalsList');
        sellingUl.innerHTML = '';
        data.selling_proposals.forEach(item => {
          let li = document.createElement('li');
          li.innerText = item;
          sellingUl.appendChild(li);
        });

        // 核心逻辑 3：修复大模型吐出 JSON 对象的渲染崩溃问题
        let templateData = data.auto_reply_template;
        if (typeof templateData === 'object' && templateData !== null) {
          templateData = JSON.stringify(templateData, null, 2);
        } else if (Array.isArray(templateData)) {
          templateData = templateData.join('\n');
        }
        document.getElementById('emailTemplate').innerText = templateData;

        resultDiv.style.display = 'block';
      } catch (error) {
        errorDiv.innerText = "分析中断: " + error.message;
      } finally {
        loading.style.display = 'none';
      }
    }
  </script>

</body>

</html>
