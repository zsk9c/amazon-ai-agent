<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>亚马逊 AI 智能分析器</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background-color: #f5f5f5;
    }

    .container {
      background-color: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    input[type="text"] {
      width: 70%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    #loading {
      color: #ff9900;
      font-weight: bold;
      margin-top: 15px;
      display: none;
    }

    .result-box {
      margin-top: 20px;
    }

    .pros {
      color: #28a745;
    }

    .cons {
      color: #dc3545;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>🚀 亚马逊跨境电商 AI 分析器 (V1.0)</h2>
    <p>请输入美国亚马逊商品链接：</p>
    <input type="text" id="urlInput" placeholder="https://www.amazon.com/dp/B0...">
    <p>请输入专属邀请码：</p>
    <input type="password" id="inviteCode" placeholder="输入邀请码解锁算力">
    <button onclick="startAnalysis()">一键分析</button>

    <div id="loading">正在控制浏览器抓取数据并调用大模型，请等待 10-20 秒...</div>

    <div id="result" class="result-box"></div>
  </div>

  <script>
    async function startAnalysis() {
      const url = document.getElementById('urlInput').value;
      const inviteCode = document.getElementById('inviteCode').value; // 获取邀请码
      const resultDiv = document.getElementById('result');
      const loadingDiv = document.getElementById('loading');

      if (!url) { alert("请先输入链接！"); return; }
      if (!inviteCode) { alert("必须输入邀请码！"); return; } // 前端物理拦截

      // 清空上次结果，显示加载提示
      resultDiv.innerHTML = "";
      loadingDiv.style.display = "block";

      try {
        // 向你本地的 Python 后端发送 POST 请求
        const response = await fetch('https://wackier-doretha-muggily.ngrok-free.dev/api/analyze', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'ngrok-skip-browser-warning': 'true'
          },
          body: JSON.stringify({ url: url, invite_code: inviteCode })


        });

        if (response.status === 401) {
          throw new Error("邀请码无效，您没有权限调用该大模型。");
        }
        if (!response.ok) {
          throw new Error(`后端报错了，状态码: ${response.status}`);
        }

        const data = await response.json();

        // 将后端的 JSON 数据渲染成漂亮的 HTML 列表
        let htmlContent = `<h3 class="pros">✅ 核心优点 (Pros)：</h3><ul>`;
        data.pros.forEach(item => { htmlContent += `<li>${item}</li>`; });
        htmlContent += `</ul><h3 class="cons">❌ 核心缺点 (Cons)：</h3><ul>`;
        data.cons.forEach(item => { htmlContent += `<li>${item}</li>`; });
        htmlContent += `</ul>`;

        resultDiv.innerHTML = htmlContent;

      } catch (error) {
        resultDiv.innerHTML = `<p style="color:red;"><b>错误：</b>${error.message}</p><p>请检查 Python 终端是否有报错信息。</p>`;
      } finally {
        // 无论成功失败，隐藏加载提示
        loadingDiv.style.display = "none";
      }
    }
  </script>

</body>

</html>
